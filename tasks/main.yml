---
# tasks file for vector-role
- name: Create vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ vector_install_dir }}"
    - "{{ vector_config_dir }}"

- name: Create vector data dir
  ansible.builtin.file:
    path: "{{ vector_data_dir }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: "0755"

- name: Download Vector archive
  ansible.builtin.get_url:
    url: "{{ vector_archive_url }}"
    dest: "/tmp/vector.tar.gz"
    mode: "0644"

- name: Extract Vector
  ansible.builtin.unarchive:
    src: "/tmp/vector.tar.gz"
    dest: "{{ vector_install_dir }}"
    remote_src: true
    creates: "{{ vector_install_dir }}/vector"
  when: not ansible_check_mode

- name: Find vector binary after extract
  ansible.builtin.find:
    paths: "{{ vector_install_dir }}"
    patterns: "vector"
    file_type: file
    recurse: true
  register: vector_bin_find

- name: Install vector binary
  ansible.builtin.copy:
    src: "{{ (vector_bin_find.files | sort(attribute='path'))[-1].path }}"
    dest: /usr/local/bin/vector
    mode: "0755"
    remote_src: true
  when: not ansible_check_mode

- name: Deploy Vector config
  ansible.builtin.template:
    src: "templates/vector/vector.yaml.j2"
    dest: "{{ vector_config_dir }}/{{ vector_config_file }}"
    mode: "0644"
  notify: Restart Vector

- name: Create vector systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/vector.service
    mode: "0644"
    content: |
      [Unit]
      Description=Vector
      After=network.target

      [Service]
      Type=simple
      ExecStartPre=/usr/local/bin/vector validate --config-yaml {{ vector_config_dir }}/{{ vector_config_file }}
      ExecStart=/usr/local/bin/vector --config-yaml {{ vector_config_dir }}/{{ vector_config_file }}
      Restart=on-failure
      RestartSec=2
      StartLimitIntervalSec=0

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart Vector

- name: Enable and start vector
  ansible.builtin.systemd:
    name: vector
    enabled: true
    state: started
  when: not ansible_check_mode
