
---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd

  - name: oraclelinux-8
    image: geerlingguy/docker-oraclelinux8-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd

provisioner:
  name: ansible

verifier:
  name: ansible

